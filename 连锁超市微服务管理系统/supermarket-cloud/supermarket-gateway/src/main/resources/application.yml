server:
  port: 8000

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: product_route
          uri: lb://product-service
          predicates:
            - Path=/product/**
        - id: auth_route
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: inventory_route
          uri: lb://inventory-service
          predicates:
            - Path=/inventory/**

        - id: order_route
          uri: lb://order-service
          predicates:
            - Path=/order/**
        
        - id: order_route
          uri: lb://order-service
          predicates:
            - Path=/shift/**

        - id: analysis_route
          uri: lb://analysis-service
          predicates:
            - Path=/analysis/**
